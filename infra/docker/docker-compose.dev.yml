version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../database/schemas:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api-server:
    build:
      context: ../..
      dockerfile: services/api-server/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ../..
      dockerfile: services/frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api-server

volumes:
  pgdata:
