# Scan commits and PRs for leaked credentials (Fernet keys, JWTs, GCP SA
# JSON, DB passwords, etc.). Runs on every PR and on every push — a leak
# that slips into git history is essentially permanent even after rotation,
# so catching it at PR-time is the only useful moment.
#
# Added after the 2026-04-19 Phase 4 session where a DB password was printed
# to an interactive terminal during `gcloud secrets versions access` and
# landed in conversation/shell logs. That particular instance was ephemeral
# (destroyed with the project), but the class of mistake is exactly what
# this workflow exists to prevent from reaching the repo.

name: Secret scan

on:
  pull_request:
  push:
    branches: [main, development, release, infra, Database, API_Server, Execution_Engine]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history — required to scan all commits in PR)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # GITLEAKS_LICENSE is only required for org-level scanning features
          # on public repos. Private personal repo is unlimited — no license
          # needed. If we later move to a Team org, add GITLEAKS_LICENSE
          # secret here.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
